<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS Extension</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    
    .status {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-weight: 500;
    }
    
    .status.connected {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: #555;
    }
    
    .tab-info {
      padding: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    button {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn-connect {
      background: #007bff;
      color: white;
    }
    
    .btn-connect:hover:not(:disabled) {
      background: #0056b3;
    }
    
    .btn-disconnect {
      background: #dc3545;
      color: white;
    }
    
    .btn-disconnect:hover:not(:disabled) {
      background: #c82333;
    }
    
    .btn-mode {
      background: #6c757d;
      color: white;
      margin-top: 4px;
    }
    
    .btn-mode:hover:not(:disabled) {
      background: #545b62;
    }
    
    .mode-indicator {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    
    .error-message {
      color: #dc3545;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>🤖 AIOS</h1>
  
  <div id="status" class="status disconnected">
    Checking Runtime...
  </div>
  
  <div class="section">
    <div class="section-title">Current Tab</div>
    <div id="tabInfo" class="tab-info">Loading...</div>
    <button id="connectBtn" class="btn-connect" disabled>Connect</button>
    <button id="disconnectBtn" class="btn-disconnect" disabled>Disconnect</button>
  </div>
  
  <div class="section">
    <div class="section-title">Agent Mode</div>
    <select id="agentMode" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #ddd;">
      <option value="manual">Manual</option>
      <option value="assistant">Assistant</option>
      <option value="autonomous">Autonomous</option>
    </select>
    <button id="setModeBtn" class="btn-mode" disabled>Set Mode</button>
    <div id="modeIndicator" class="mode-indicator"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
